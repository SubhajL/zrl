services:
  postgres:
    image: postgres:15-alpine
    container_name: zrl-postgres
    environment:
      POSTGRES_DB: zrl_dev
      POSTGRES_USER: zrl
      POSTGRES_PASSWORD: zrl_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zrl -d zrl_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zrl-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zrl-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://zrl:zrl_dev_password@postgres:5432/zrl_dev?schema=public
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zrl-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3001:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
