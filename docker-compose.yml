services:
  postgres:
    image: postgres:15-alpine
    container_name: zrl-postgres
    environment:
      POSTGRES_DB: zrl_dev
      POSTGRES_USER: zrl
      POSTGRES_PASSWORD: zrl_dev_password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zrl -d zrl_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zrl-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
