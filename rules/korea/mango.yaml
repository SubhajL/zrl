# Source checked: 2026-04-03
# Primary sources:
# - https://www.qia.go.kr/plant/imQua/plant_fruit_cond.jsp
# - https://www.foodsafetykorea.go.kr/residue/prd/mrls/list.do
# Notes:
# - Thailand mango import conditions published by APQA/QIA require phytosanitary
#   certification plus vapor-heat-treatment and overseas inspection controls.
# - The Korea MRL database is official but did not expose stable non-interactive
#   commodity-level values during this pass, so substances are intentionally
#   deferred in the companion CSV until direct numeric capture is automated.
market: KOREA
product: MANGO
version: 1
effectiveDate: 2026-04-03
requiredDocuments:
  - Phytosanitary Certificate
  - VHT Certificate
  - MRL Test Results
  - GAP Certificate
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: PRIMARY_PARTIAL
  sourceQuality: PRIMARY_ONLY
  retrievedAt: 2026-04-03
  commodityCode: ap105050006
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: QIA fruit import conditions
    - type: VHT
      status: REQUIRED
      parameters:
        minCoreTemperatureC: 47
        minHoldMinutes: 20
      sourceRef: QIA fruit import conditions
      note: Structured from current coding-log research; YAML comments still need cleanup.
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter orchard and packinghouse eligibility controls
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./mango-substances.csv
