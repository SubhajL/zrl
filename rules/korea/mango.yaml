# Source checked: 2026-04-04
# Primary sources:
# - https://www.qia.go.kr/plant/imQua/plant_fruit_cond.jsp
# - https://www.foodsafetykorea.go.kr/residue/prd/mrls/list.do
# Notes:
# - The current QIA import-condition page for Thailand mango states phytosanitary
#   certification, vapor-heat treatment at 47C or above for 20 minutes, and
#   Korean overseas production-site inspection controls.
# - The current MFDS residue page states that Korea applies 0.01 mg/kg when no
#   specific agricultural pesticide MRL is established and exposes mango under
#   commodity code ap105050006.
# - The companion CSV snapshots 64 current MFDS mango-specific rows for
#   commodity code ap105050006 as re-verified on 2026-04-04.
market: KOREA
product: MANGO
version: 1
effectiveDate: 2026-04-03
requiredDocuments:
  - Phytosanitary Certificate
  - VHT Certificate
  - MRL Test Results
  - GAP Certificate
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: FULL_EXHAUSTIVE
  sourceQuality: PRIMARY_ONLY
  retrievedAt: 2026-04-04
  commodityCode: ap105050006
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: QIA fruit import conditions
    - type: VHT
      status: REQUIRED
      parameters:
        minCoreTemperatureC: 47
        minHoldMinutes: 20
        overseasInspectionRequired: true
        registrationRequired: true
        allowedVarieties: Nang klarngwan|Nam Dork Mai|Rad|Mahachanok
      sourceRef: QIA fruit import conditions
      note: Thailand mango import condition on the current QIA page requires VHT plus Korean overseas production-site inspection.
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter orchard and packinghouse eligibility controls
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./mango-substances.csv
