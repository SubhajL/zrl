# Source checked: 2026-04-05
# Primary sources:
# - https://www.qia.go.kr/plant/imQua/plant_fruit_cond.jsp
# - https://www.foodsafetykorea.go.kr/residue/prd/mrls/list.do
# Notes:
# - The current QIA import-conditions page lists Thai mangosteen as a
#   conditional import item requiring registered orchards, pest control and
#   management, registered packinghouses, mandatory methyl-bromide fumigation,
#   Korean overseas inspection, and a phytosanitary certificate that states the
#   fumigation treatment details.
# - The current MFDS residue page exposes direct mangosteen rows under
#   commodity code ap105051360 and applies 0.01 mg/kg when no specific
#   agricultural pesticide MRL is established.
# - The companion CSV snapshots the full current direct mangosteen row set
#   returned by MFDS on 2026-04-05: 3 explicit rows plus the official fallback
#   rule.
market: KOREA
product: MANGOSTEEN
version: 1
effectiveDate: 2026-04-05
requiredDocuments:
  - Phytosanitary Certificate
  - MRL Test Results
  - GAP Certificate
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: FULL_EXHAUSTIVE
  sourceQuality: PRIMARY_ONLY
  retrievedAt: 2026-04-05
  commodityCode: ap105051360
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters:
        treatmentType: METHYL_BROMIDE_FUMIGATION
        treatmentRequired: true
        certificateMustStateTreatmentDetails: true
        overseasInspectionRequired: true
        registrationRequired: true
        registeredPackinghouseRequired: true
        pestControlProgramRequired: true
      sourceRef: QIA fruit import conditions
      note: QIA lists Thai mangosteen as a conditional import path tied to phytosanitary certification that must state MB fumigation details plus Korean overseas inspection and registration controls.
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter orchard and packinghouse eligibility controls
      note: ZRL operational baseline; not a separately listed QIA certificate.
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./mangosteen-substances.csv
