market: JAPAN
product: MANGO
version: 1
effectiveDate: 2026-03-01
requiredDocuments:
  - Phytosanitary Certificate
  - VHT Certificate
  - MRL Test Results
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - GAP Certificate
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: CURATED_HIGH_RISK
  sourceQuality: PRIMARY_ONLY
  retrievedAt: 2026-04-03
  commodityCode:
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Thailand DOA phytosanitary export workflow
    - type: VHT
      status: REQUIRED
      parameters:
        requiredCertificate: true
      sourceRef: MAFF quarantine path
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter compliance baseline
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./mango-substances.csv
