# Source checked: 2026-04-04
# Primary sources:
# - https://www.maff.go.jp/pps/j/law/houki/saisoku/saisoku_107_html_107.html
#   (Thai fresh mangosteen phytosanitary implementation rule)
# - https://db.ffcr.or.jp/front/?lng=en (JFCRF MRL Database / 11900 export)
# Notes:
# - The prior VHT-exemption claim was incorrect. MAFF's current mangosteen rule
#   requires steam-heat treatment plus phytosanitary certificate / label control.
# - The pesticide side uses the full 11900 "Other Fruits" export because that is
#   the official JFCRF bucket used for mangosteen-applicable explicit rows.
# - One explicit row in the export is excluded from this pack: GIBBERELLIN,
#   because the source note scopes it to acerola only.
market: JAPAN
product: MANGOSTEEN
version: 1
effectiveDate: 2026-04-04
requiredDocuments:
  - Phytosanitary Certificate
  - VHT Certificate
  - MRL Test Results
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - GAP Certificate
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: FULL_EXHAUSTIVE
  sourceQuality: PRIMARY_PLUS_SECONDARY
  retrievedAt: 2026-04-04
  commodityCode: '11900'
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters:
        requiresCertificateLabel: true
        destinationMarking: FOR JAPAN
        minInspectionSamplePercent: 5
      sourceRef: https://www.maff.go.jp/pps/j/law/houki/saisoku/saisoku_107_html_107.html
      note: MAFF requires phytosanitary certificate or certificate-label control for treated Thai mangosteen consignments.
    - type: VHT
      status: REQUIRED
      parameters:
        minRelativeHumidityPercent: 50
        maxRelativeHumidityPercent: 80
        rampTargetTemperatureC: 43
        minCoreTemperatureC: 46
        minHoldMinutes: 58
        minCoolingMinutes: 60
      sourceRef: https://www.maff.go.jp/pps/j/law/houki/saisoku/saisoku_107_html_107.html
      note: Steam-heat treatment must reach 46C core temperature and hold for 58 minutes, then cool by ventilation for at least 60 minutes.
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter compliance baseline
      note: ZRL operational baseline; not a MAFF import-condition requirement.
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./mangosteen-substances.csv
