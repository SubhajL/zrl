# Source checked: 2026-04-04
# Primary sources:
# - https://www.pps.maff.go.jp/eximlist/Pages/exp/condition.xhtml
# - https://www.caa.go.jp/en/policy/standards_evaluation/residues_of_pesticides/
# - https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/shokuhin/zanryu/index_00016.html
# Supporting sources:
# - https://db.ffcr.or.jp/
# Notes:
# - MAFF import-condition DB returns ドリアン (Durio zibethinus) / 生果実 as:
#   0 prohibited, 1 normal-inspection result, 0 Annex 1-2 measures, 0 Annex 2-2
#   measures. This supports the standard phytosanitary-certificate path with no
#   special VHT or other additional quarantine treatment requirement.
# - JFCRF's broad parent bucket 11900 (その他の果実) lists durian by name, and the
#   more specific bucket 25839 (その他の果実(アセロラを除く。)) is the durian-
#   applicable commodity snapshot. Its explicit row set contains only one
#   physiological-level gibberellin entry; all other pesticides rely on the
#   0.01 mg/kg positive-list fallback.
market: JAPAN
product: DURIAN
version: 1
effectiveDate: 2026-04-04
requiredDocuments:
  - Phytosanitary Certificate
  - MRL Test Results
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - GAP Certificate
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: FULL_EXHAUSTIVE
  sourceQuality: PRIMARY_PLUS_SECONDARY
  retrievedAt: 2026-04-04
  commodityCode: '25839'
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters:
        maffImportConditionResult: NORMAL_INSPECTION
        prohibitedResultCount: 0
        normalInspectionResultCount: 1
        annex1_2MeasureResultCount: 0
        annex2_2MeasureResultCount: 0
      sourceRef: MAFF import-condition DB result for ドリアン (Durio zibethinus) / 生果実
      note: Standard phytosanitary certificate path; no special Annex treatment listed
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter compliance baseline
      note: ZRL operational baseline, not a MAFF import condition
labPolicy:
  enforcementMode: FULL_PESTICIDE
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg: 0.01
substancesFile: ./durian-substances.csv
