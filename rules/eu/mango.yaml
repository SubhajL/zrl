# Source checked: 2026-04-03
# Primary sources:
# - https://food.ec.europa.eu/plants/plant-health-and-biosecurity/trade-plants-plant-products-non-eu-countries_en
# - https://food.ec.europa.eu/horizontal-topics/traces_en
# - https://food.ec.europa.eu/plants/pesticides/maximum-residue-levels_en
# - https://ec.europa.eu/food/plant/pesticides/eu-pesticides-database/public/?event=homepage&language=EN
# Notes:
# - Fresh mango entering the EU requires a phytosanitary certificate and follows
#   TRACES-based import workflows.
# - The official EU pesticides database is the authority for MRL values, but the
#   interactive database did not expose stable product-level values via this
#   research path, so substances remain intentionally deferred for now.
market: EU
product: MANGO
version: 1
effectiveDate: 2026-04-03
requiredDocuments:
  - Phytosanitary Certificate
  - MRL Test Results
  - GAP Certificate
  - Export License
  - Commercial Invoice
  - Grading Report
  - Product Photos
  - Packing List
  - Temperature Log
  - SLA Summary
  - Excursion Report
  - Handoff Signatures
  - Transport Document
  - Delivery Note
completenessWeights:
  regulatory: 0.4
  quality: 0.25
  coldChain: 0.2
  chainOfCustody: 0.15
metadata:
  coverageState: PRIMARY_PARTIAL
  sourceQuality: PRIMARY_ONLY
  retrievedAt: 2026-04-03
  commodityCode:
  nonPesticideChecks:
    - type: PHYTO_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: EU plant-health import controls
      note: Phytosanitary certificate required for fresh mango entry from non-EU countries.
    - type: GAP_CERT
      status: REQUIRED
      parameters: {}
      sourceRef: Exporter compliance baseline
    - type: COLD_CHAIN
      status: INFORMATIONAL
      parameters: {}
      sourceRef: Operational cold-chain evidence expectation
labPolicy:
  enforcementMode: DOCUMENT_ONLY
  requiredArtifactType: MRL_TEST
  acceptedUnits:
    - mg/kg
    - ppm
  defaultDestinationMrlMgKg:
substancesFile: ./mango-substances.csv
