# Source checked: 2026-04-07
# Scope:
# - Supported runtime market/product rule packs currently on disk only.
# - First-pass OCR/form completeness scope covers official/formal artifacts only.
# - Operational evidence such as Product Photos, Temperature Log, SLA Summary,
#   Excursion Report, and Handoff Signatures is intentionally excluded here and
#   will require separate operational schemas if OCR is later extended to them.
# Notes:
# - "Export License" currently maps to Thailand-side exporter authorization /
#   registration evidence with medium-low confidence; do not treat it as a
#   destination-market government import form.
# - "VHT Certificate" is modeled as treatment evidence with medium confidence
#   because public official sources define treatment conditions more clearly
#   than a single harmonized certificate template.
# - EU mangosteen remains taxonomy-sensitive for pesticide/MRL enforcement, but
#   that does not materially change the document-field matrix below.
version: 1
artifactTypes:
  - PHYTO_CERT
  - VHT_CERT
  - MRL_TEST
  - GAP_CERT
  - INVOICE
