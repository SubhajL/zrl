documents:
  - documentLabel: Phytosanitary Certificate
    artifactType: PHYTO_CERT
    documentClass: OFFICIAL_GOVERNMENT_FORM
    documentRole: THAILAND_NPPO_EXPORT_CERTIFICATE
    confidence: HIGH
    applicableCombos:
      - EU/DURIAN
      - EU/MANGO
      - EU/MANGOSTEEN
      - JAPAN/DURIAN
      - JAPAN/MANGO
      - JAPAN/MANGOSTEEN
      - KOREA/DURIAN
      - KOREA/MANGO
      - KOREA/MANGOSTEEN
    sourceUrls:
      - https://assets.ippc.int/static/media/files/publication/en/2022/05/ISPM_12_2022_En_PCs_2022-04-21_PostCPM-16.pdf
      - https://e-phyto.doa.go.th/
      - https://food.ec.europa.eu/plants/plant-health-and-biosecurity/trade-plants-plant-products-non-eu-countries_en
      - https://food.ec.europa.eu/horizontal-topics/traces_en
      - https://www.maff.go.jp/pps/j/law/houki/kokuji_joken/kokuji_joken_23_html_23.html
      - https://www.maff.go.jp/pps/j/law/houki/saisoku/saisoku_107_html_107.html
      - https://www.qia.go.kr/plant/imQua/plant_fruit_cond.jsp
    requiredFieldKeys:
      - certificateNumber
      - issuingAuthority
      - exporterName
      - consigneeName
      - packageDescription
      - placeOfOrigin
      - meansOfConveyance
      - declaredPointOfEntry
      - commodityDescription
      - botanicalName
      - additionalDeclarations
      - issueDate
      - authorizedOfficer
      - officialSealOrSignature
    marketSpecificFieldRules:
      - combo: JAPAN/MANGO
        requiredFieldKeys:
          - mustStateFruitFlyFree
          - treatmentReference
      - combo: JAPAN/MANGOSTEEN
        requiredFieldKeys:
          - treatmentReference
          - packageMarkingForJapan
      - combo: KOREA/MANGOSTEEN
        requiredFieldKeys:
          - treatmentReference
          - fumigationDetails
    notes:
      - Thailand-origin phytosanitary certificate presented to destination-market plant-health authorities.
      - Treatment-specific declarations may be mandatory for certain Japan/Korea flows.
  - documentLabel: VHT Certificate
    artifactType: VHT_CERT
    documentClass: TREATMENT_EVIDENCE
    documentRole: TREATMENT_CERTIFICATE_OR_RECORD
    confidence: MEDIUM
    applicableCombos:
      - JAPAN/MANGO
      - JAPAN/MANGOSTEEN
      - KOREA/MANGO
    sourceUrls:
      - https://www.maff.go.jp/pps/j/law/houki/kokuji_joken/kokuji_joken_23_html_23.html
      - https://www.maff.go.jp/pps/j/law/houki/saisoku/saisoku_107_html_107.html
      - https://www.qia.go.kr/plant/imQua/plant_fruit_cond.jsp
    requiredFieldKeys:
      - treatmentRecordNumber
      - commodityName
      - lotOrConsignmentId
      - treatmentFacility
      - treatmentDate
      - treatmentMethod
      - targetCoreTemperatureC
      - holdMinutes
      - operatorOrInspector
      - linkedPhytoCertificateNumber
    marketSpecificFieldRules:
      - combo: JAPAN/MANGO
        requiredFieldKeys:
          - allowedVariety
          - maffVerificationReference
      - combo: JAPAN/MANGOSTEEN
        requiredFieldKeys:
          - humidityRequirement
          - coolingRequirement
      - combo: KOREA/MANGO
        requiredFieldKeys:
          - overseasInspectionReference
    notes:
      - Public official sources define treatment conditions more clearly than a single harmonized certificate layout.
      - Japan mangosteen requirement is treatment evidence tied to steam-heat conditions, even though the repo label is VHT Certificate.
  - documentLabel: MRL Test Results
    artifactType: MRL_TEST
    documentClass: LAB_REPORT
    documentRole: RESIDUE_ANALYSIS_REPORT
    confidence: MEDIUM_HIGH
    applicableCombos:
