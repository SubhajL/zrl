      - EU/MANGOSTEEN
      - JAPAN/DURIAN
      - JAPAN/MANGO
      - JAPAN/MANGOSTEEN
      - KOREA/DURIAN
      - KOREA/MANGO
      - KOREA/MANGOSTEEN
    sourceUrls:
      - https://food.ec.europa.eu/plants/pesticides/maximum-residue-levels_en
      - https://food.ec.europa.eu/plants/pesticides/eu-pesticides-database_en
      - https://www.caa.go.jp/en/policy/standards_evaluation/residues_of_pesticides/
      - https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/shokuhin/zanryu/index_00016.html
      - https://db.ffcr.or.jp/
      - https://www.foodsafetykorea.go.kr/residue/prd/mrls/list.do
    requiredFieldKeys:
      - reportNumber
      - laboratoryName
      - accreditationReference
      - sampleId
      - commodityName
      - sampleOriginCountry
      - sampleReceiptDate
      - analysisDate
      - analyticalMethod
      - analyteTable
      - resultUnits
      - authorizedSignatory
    notes:
      - Lab reports are formal evidence artifacts but not government-issued forms.
      - Required field completeness should verify schema presence, not chemical compliance outcomes.
