name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  DATABASE_URL: 'postgresql://zrl:zrl_dev_password@localhost:5432/zrl_dev?schema=public'

jobs:
  # Database Migrations
  db-migrations:
    name: Database Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run seed
        run: npm run db:seed

  # Backend Tests (NestJS)
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Check no PrismaClient in runtime code
        run: npm run check:prisma-runtime

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm run test:cov

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

  # Frontend Tests (Next.js)
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations and seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Run E2E tests
        run: npm run test:e2e

  # Playwright E2E
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npm run test:e2e:install

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations and seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Build backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          ZRL_API_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
        run: npm run build

      - name: Prepare Playwright workspace
        run: mkdir -p playwright-artifacts

      - name: Start backend
        run: |
          CERTIFICATION_EXPIRY_WORKER_ENABLED=false \
          PORT=3001 \
          npm run start:prod > playwright-artifacts/backend.log 2>&1 &
          echo $! > playwright-artifacts/backend.pid

      - name: Wait for backend
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3001/cold-chain/profiles || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat playwright-artifacts/backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        env:
          AUTH_COOKIE_SECURE: 'false'
          PORT: '3000'
          ZRL_API_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
        run: |
          npm run start -- --port 3000 > ../playwright-artifacts/frontend.log 2>&1 &
          echo $! > ../playwright-artifacts/frontend.pid

      - name: Wait for frontend
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat playwright-artifacts/frontend.log
          exit 1

      - name: Run Playwright suite
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-artifacts/
            frontend/test-results/
            frontend/playwright-report/

      - name: Stop frontend and backend
        if: always()
        run: |
          if [ -f playwright-artifacts/frontend.pid ]; then
            kill "$(cat playwright-artifacts/frontend.pid)" || true
          fi
          if [ -f playwright-artifacts/backend.pid ]; then
            kill "$(cat playwright-artifacts/backend.pid)" || true
          fi

  # Performance Smoke
  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations and seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Build backend
        run: npm run build

      - name: Prepare performance workspace
        run: mkdir -p k6-results

      - name: Start backend
        run: |
          CERTIFICATION_EXPIRY_WORKER_ENABLED=false \
          PORT=3001 \
          npm run start:prod > k6-results/backend.log 2>&1 &
          echo $! > k6-results/backend.pid

      - name: Wait for backend
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3001/cold-chain/profiles || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat k6-results/backend.log
          exit 1

      - name: Run k6 smoke suite
        run: |
          K6_BASE_URL=http://host.docker.internal:3001 \
          npm run test:perf:smoke

      - name: Upload k6 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-artifacts
          path: |
            k6-results/

      - name: Stop backend
        if: always()
        run: |
          if [ -f k6-results/backend.pid ]; then
            kill "$(cat k6-results/backend.pid)" || true
          fi

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zrl
          POSTGRES_PASSWORD: zrl_dev_password
          POSTGRES_DB: zrl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zrl -d zrl_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations and seed
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend npm audit
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build backend
        run: npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          ZRL_API_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
        run: npm run build

      - name: Prepare security scan workspace
        run: mkdir -p zap

      - name: Start backend
        run: |
          PROOF_PACK_WORKER_ENABLED=false \
          CERTIFICATION_EXPIRY_WORKER_ENABLED=false \
          PORT=3001 \
          npm run start:prod > zap/backend.log 2>&1 &
          echo $! > zap/backend.pid

      - name: Wait for backend
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3001/cold-chain/profiles || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat zap/backend.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        env:
          PORT: '3000'
          ZRL_API_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
        run: |
          npm run start > ../zap/frontend.log 2>&1 &
          echo $! > ../zap/frontend.pid

      - name: Wait for frontend
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat zap/frontend.log
          exit 1

      - name: Run OWASP ZAP baseline scans
        run: |
          FRONTEND_TARGET_URL=http://host.docker.internal:3000/ \
          BACKEND_TARGET_URL=http://host.docker.internal:3001/cold-chain/profiles \
          npm run security:zap

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-artifacts
          path: |
            zap/

      - name: Stop frontend and backend
        if: always()
        run: |
          if [ -f zap/frontend.pid ]; then
            kill "$(cat zap/frontend.pid)" || true
          fi
          if [ -f zap/backend.pid ]; then
            kill "$(cat zap/backend.pid)" || true
          fi

  # Build
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate backend Docker image
        run: docker build -f Dockerfile .

      - name: Validate frontend Docker image
        run: docker build -f frontend/Dockerfile frontend
